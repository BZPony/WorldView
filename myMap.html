<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基于地图的时空可视化系统</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/sidebar.css" />
    <link rel="stylesheet" href="css/detail.css" />
    <link rel="stylesheet" href="css/timeline.css" />
    <link rel="stylesheet" href="css/context-menu.css" />
    <link rel="stylesheet" href="css/modal.css" />
</head>

<body>

    <!-- =====================================================
        1. 侧边栏 UI
    ===================================================== -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <button class="sidebar-toggle-btn--close" id="sidebar-btn-close">
                <span class="icon" data-name="leftArrow"></span>
            </button>
        </div>

        <!-- ===== 顶部 Tabs ===== -->
        <ul class="sidebar-tabs">
            <li>
                <button class="sidebar-tabs-btn" data-name="explorer">
                    <span class="icon" data-name="explorer"></span>
                    资源
                </button>
            </li>
            <li>
                <button class="sidebar-tabs-btn active" data-name="filter">
                    <span class="icon" data-name="filter"></span>
                    筛选
                </button>
            </li>
        </ul>

        <!-- 分割线 -->
        <div style="height:1px; background:#555; margin: 0 10px;"></div>

        <!-- ===== 面板内容 ===== -->
        <div class="sidebar-content">

            <!-- 筛选器 -->
            <div class="sidebar-content-panel sidebar-content-panel--filter active">
            </div>

            <!-- 资源管理器 -->
            <div class="sidebar-content-panel sidebar-content-panel--explorer">
            </div>
    </aside>

    <aside class="detail">
        <div class="detail-header">
            <button class="detail-toggle-btn--close" id="detail-btn-close">
                <span class="icon" data-name="cross"></span>
            </button>
            <button class="detail-toggle-btn--thumbtack" id="detail-btn-thumbtack">
                <span class="icon" data-name="thumbtack"></span>
            </button>
            <button class="detail-toggle-btn--delete" id="detail-btn-delete">
                <span class="icon" data-name="delete"></span>
            </button>
        </div>

        <div class="detail-content" id="detail-content">
            <div class="detail-content-title">detail</div>
        </div>
    </aside>

    <aside class="detail detail-secondary">
        <div class="detail-header">
            <button class="detail-toggle-btn--close" id="detail-secondary-btn-close">
                <span class="icon" data-name="cross"></span>
            </button>
        </div>

        <div class="detail-content" id="detail-secondary-content">
            <div class="detail-content-title"></div>
        </div>
    </aside>

    <button class="sidebar-toggle-btn--open" id="sidebar-btn-open">
        <span class="icon" data-name="menu"></span>
    </button>

    <!-- =====================================================
        2. 地图
    ===================================================== -->
    <div id="map"></div>

    <!-- =====================================================
        3. 时间轴 UI
    ===================================================== -->
    <div class="timeline-container" id="timeline-container">
        <div class="timeline-track" id="timeline-track"></div>
        <div class="timeline-cursor"></div>
    </div>

    <div class="timeline-zoom-btns" id="timeline-zoom-btns">
        <button class="timeline-zoom-btn timeline-zoom-btn--in" id="timeline-zoom-in" title="放大分辨率">
            <span class="icon" data-name="zoomIn"></span>
        </button>
        <button class="timeline-zoom-btn timeline-zoom-btn--out" id="timeline-zoom-out" title="缩小分辨率">
            <span class="icon" data-name="zoomOut"></span>
        </button>
    </div>

    <!-- =====================================================
        4. 右键菜单
    ===================================================== -->
    <div id="context-menu" class="context-menu is-hidden"></div>

    <!-- =====================================================
        5. 通用弹窗
    ===================================================== -->
    <div id="modal-overlay" class="modal-overlay is-hidden"></div>
    <div id="modal" class="modal is-hidden">
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-body" id="modal-body"></div>
    </div>

    <!-- =====================================================
        6. JS依赖
    ===================================================== -->

    <script src="js/utils/color.js"></script>
    <script src="js/data/timeConfig.js"></script>

    <script src="js/icons/svg-icons.js"></script>
    <script src="js/data/entities.js"></script>

    <script src="js/utils/time.js"></script>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="js/core/eventBus.js"></script>
    <script src="js/core/state.js"></script>
    <script src="js/core/selectManager.js"></script>
    <script src="js/core/commandHandler.js"></script>
    <script src="js/data/filter.js"></script>
    <script src="js/components/view/contextMenu.js"></script>
    <script src="js/components/view/modal.js"></script>
    <script src="js/components/view/timeline.js"></script>
    <script src="js/components/view/sidebar.js"></script>
    <!-- Detail Panel 渲染器 -->
    <script src="js/components/detail/componentRenderers/core.js"></script>
    <script src="js/components/detail/componentRenderers/motion.js"></script>
    <script src="js/components/detail/componentRenderers/nameHistory.js"></script>
    <script src="js/components/detail/componentRenderers/place.js"></script>
    <script src="js/components/detail/componentRenderers/person.js"></script>
    <script src="js/components/detail/componentRenderers/organization.js"></script>
    <script src="js/components/detail/componentRenderers/regime.js"></script>
    <script src="js/components/detail/componentRenderers/customTags.js"></script>
    <script src="js/components/detail/secondaryDetailRenderers/motionItem.js"></script>
    <script src="js/components/detail/secondaryDetailRenderers/nameHistoryItem.js"></script>
    <script src="js/components/view/detail.js"></script>
    <script src="js/components/view/layout.js"></script>
    <script src="js/components/view/map.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            initIcons();
        });

        // 1. 设置初始数据
        AppState.set('entities', entities);
        AppState.set('currentTime', { year: 0 });

        // 2. 按依赖顺序初始化模块
        MapView.init('map');                // 地图必须先创建（Leaflet 实例）
        ContextMenu.init(MapView.map);      // 传入地图实例
        SelectManager.init();
        CommandHandler.init();
        LayoutManager.init();
        Modal.init();
        Timeline.init({
            startYear: -1000,
            endYear: 1000,
            tickStep: 50,
            tickWidth: 100,
            containerId: 'timeline-container',
            trackId: 'timeline-track'
        });
        Sidebar.init();
        DetailPanel.init();

        // Secondary Panel 初始化（函数已在 detail.js 中覆盖）
        SecondaryDetailPanel.init({
            containerSelector: '.detail-secondary',
            contentSelector: '#detail-secondary-content',
            btnCloseSelector: '#detail-secondary-btn-close',
            allowEdit: true
        });
        SecondaryDetailPanel._updateOpenState(false);

        // 3. 初始渲染（地图已自动调用一次，此处可省略）
        // 侧边栏人物列表需手动触发一次
        Sidebar.renderResourceList();
    </script>

</body>

</html>
