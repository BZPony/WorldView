<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基于地图的时空可视化系统</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/sidebar.css" />
    <link rel="stylesheet" href="css/detail.css" />
    <link rel="stylesheet" href="css/timeline.css" />
    <link rel="stylesheet" href="css/context-menu.css" />
</head>

<body>

    <!-- =====================================================
        1. 侧边栏 UI
    ===================================================== -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <button class="sidebar-toggle-btn--close" id="sidebar-btn-close">
                <span class="icon" data-name="leftArrow"></span>
            </button>
        </div>

        <!-- ===== 顶部 Tabs ===== -->
        <ul class="sidebar-tabs">
            <li>
                <button class="sidebar-tabs-btn" data-name="explorer">
                    <span class="icon" data-name="explorer"></span>
                    资源
                </button>
            </li>
            <li>
                <button class="sidebar-tabs-btn active" data-name="filter">
                    <span class="icon" data-name="filter"></span>
                    筛选
                </button>
            </li>
        </ul>

        <!-- 分割线 -->
        <div style="height:1px; background:#555; margin: 0 10px;"></div>

        <!-- ===== 面板内容 ===== -->
        <div class="sidebar-content">

            <!-- 筛选器 -->
            <div class="sidebar-content-panel sidebar-content-panel--filter active">
                <p>这里放筛选条件（类别 / 时间等）</p>
            </div>

            <!-- 资源管理器 -->
            <div class="sidebar-content-panel sidebar-content-panel--explorer">
                <div class="sidebar-content-panel-btn" data-name="characters">
                    <span class="icon" data-name="man"></span>
                    人物
                    <span class="icon" data-name="rightArrow"></span>
                </div>

                <div class="sidebar-content-subpanel" id="person-list">

                </div>

                <div class="sidebar-content-panel-btn" data-name="organizations">
                    <span class="icon" data-name="organization"></span>
                    组织
                    <span class="icon" data-name="rightArrow"></span>
                </div>

                <div class="sidebar-content-subpanel">
                    <div class="sidebar-content-subitem">圣殿骑士</div>
                    <div class="sidebar-content-subitem">罗莎莉亚的指头</div>
                    <div class="sidebar-content-subitem">保护伞公司</div>
                    <div class="sidebar-content-subitem">猎魔人</div>
                    <div class="sidebar-content-subitem">避难所科技</div>
                </div>

                <div class="sidebar-content-panel-btn" data-name="countries">
                    <span class="icon" data-name="country"></span>
                    政权
                    <span class="icon" data-name="rightArrow"></span>
                </div>

                <div class="sidebar-content-subpanel">
                    <div class="sidebar-content-subitem">天马城邦</div>
                    <div class="sidebar-content-subitem">洛斯里克王国</div>
                    <div class="sidebar-content-subitem">永恒之城诺克隆恩</div>
                    <div class="sidebar-content-subitem">博德之门</div>
                    <div class="sidebar-content-subitem">刚铎</div>
                    <div class="sidebar-content-subitem">新加州共和国</div>
                </div>
            </div>

        </div>
    </aside>

    <aside class="detail">
        <div class="detail-header">
            <button class="detail-toggle-btn--close" id="detail-btn-close">
                <span class="icon" data-name="cross"></span>
            </button>
        </div>

        <h3>detail</h3>

        <div class="detail-content">

        </div>
    </aside>

    <button class="sidebar-toggle-btn--open" id="sidebar-btn-open">
        <span class="icon" data-name="menu"></span>
    </button>

    <!-- =====================================================
        2. 地图
    ===================================================== -->
    <div id="map"></div>

    <!-- =====================================================
        3. 时间轴 UI
    ===================================================== -->
    <div class="timeline-container" id="timeline-container">
        <div class="timeline-track" id="timeline-track"></div>
        <div class="timeline-cursor"></div>
    </div>

    <!-- =====================================================
        4. 右键菜单
    ===================================================== -->
    <div id="context-menu" class="context-menu is-hidden">
        <div class="context-menu-item" data-action="createPerson">创建人物</div>
        <div class="context-menu-item" data-action="createWaypoint">创建途径点</div>
    </div>

    <!-- =====================================================
        5. JS依赖
    ===================================================== -->

    <script src="js/icons/svg-icons.js"></script>
    <script src="js/data/persons.js"></script>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="js/core/eventBus.js"></script>
    <script src="js/core/state.js"></script>
    <script src="js/core/selectManager.js"></script>
    <script src="js/components/contextMenu.js"></script>
    <script src="js/components/timeline.js"></script>
    <script src="js/components/sidebar.js"></script>
    <script src="js/components/detail.js"></script>
    <script src="js/components/layout.js"></script>
    <script src="js/components/map.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            initIcons();
        });

        // 1. 设置初始数据（persons 已在 data/persons.js 全局声明，暂存到 AppState）
        AppState.set('persons', persons);
        AppState.set('currentTime', 0);

        // 2. 按依赖顺序初始化模块
        MapView.init('map');                // 地图必须先创建（Leaflet 实例）
        ContextMenu.init(MapView.map);      // 传入地图实例
        SelectManager.init();
        Timeline.init({
            startYear: -1000,
            endYear: 1000,
            tickStep: 50,
            tickWidth: 100,
            containerId: 'timeline-container',
            trackId: 'timeline-track'
        });
        Sidebar.init();
        DetailPanel.init()
        LayoutManager.init();

        // 3. 初始渲染（地图已自动调用一次，此处可省略）
        // 侧边栏人物列表需手动触发一次
        Sidebar.renderPersonList();
    </script>

</body>

</html>
